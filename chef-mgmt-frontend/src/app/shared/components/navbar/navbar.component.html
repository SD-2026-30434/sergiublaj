@if (loggedUser) {
  <p-menubar [model]="menuItems">
    <ng-template #start>
      <span class="font-bold text-xl mr-4 cursor-pointer" (click)="goHome()">
        <i class="pi pi-bolt mr-2"></i>Chef MGMT
      </span>
    </ng-template>
    <ng-template #end>
      <p-button icon="pi pi-sign-out" label="Logout" [text]="true" (onClick)="onLogout()" />
    </ng-template>
  </p-menubar>
}

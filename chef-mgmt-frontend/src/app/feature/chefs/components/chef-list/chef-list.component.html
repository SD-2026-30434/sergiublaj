<h2>Chefs</h2>

<p-toolbar class="mb-4">
  <ng-template #start>
    <p-button label="New" icon="pi pi-plus" (onClick)="openNewChef()" />
  </ng-template>
</p-toolbar>

<p-table
  [value]="chefs"
  [paginator]="true"
  [rows]="size"
  [totalRecords]="totalElements"
  [rowsPerPageOptions]="[5, 10, 25]"
  [first]="page * size"
  [sortField]="sortField"
  [sortOrder]="sortOrder"
  [lazy]="true"
  dataKey="id"
  class="p-datatable-striped"
  (onSort)="onSort($event)"
  (onPage)="onPage($event)"
>
  <ng-template #caption>
    <div class="flex justify-content-end">
      <p-iconfield>
        <p-inputicon class="pi pi-search" />
        <input pInputText type="text" placeholder="Search..." [value]="search" (input)="onSearch($any($event.target).value)" />
      </p-iconfield>
    </div>
  </ng-template>

  <ng-template #header>
    <tr>
      <th pSortableColumn="name">Name <p-sortIcon field="name" /></th>
      <th pSortableColumn="email">Email <p-sortIcon field="email" /></th>
      <th pSortableColumn="birthDate">Birth Date <p-sortIcon field="birthDate" /></th>
      <th pSortableColumn="rating">Rating <p-sortIcon field="rating" /></th>
      <th class="actions-col-wide">Actions</th>
    </tr>
  </ng-template>

  <ng-template #body let-chef>
    <tr>
      <td>{{ chef.name }}</td>
      <td>{{ chef.email }}</td>
      <td>{{ chef.birthDate | date:'mediumDate' }}</td>
      <td>
        <p-tag [value]="(chef.numberOfStars | number:'1.1-1') ?? ''" [severity]="chef.numberOfStars >= 4.5 ? 'success' : chef.numberOfStars >= 3.5 ? 'warn' : 'danger'" icon="pi pi-star" />
      </td>
      <td>
        <p-button icon="pi pi-eye" [rounded]="true" [text]="true" (onClick)="viewChef(chef)" class="mr-1" />
        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info" (onClick)="editChef(chef)" class="mr-1" />
        <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="openDeleteModal(chef)" />
      </td>
    </tr>
  </ng-template>
</p-table>

<app-chef-form
  [(visible)]="formVisible"
  [chef]="selectedChef"
  (save)="onSave($event)"
/>

@if (chefToDelete) {
  <app-delete-modal
    [(visible)]="deleteModalVisible"
    [itemName]="chefToDelete.name"
    (confirm)="onDeleteConfirm()"
  />
}

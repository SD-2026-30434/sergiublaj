spring:
  autoconfigure:
    exclude: org.springframework.boot.amqp.autoconfigure.RabbitAutoConfiguration
  datasource:
    url: jdbc:h2:mem:chef-mgmt-mail-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
  mail:
    host: localhost
    port: 3025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
app:
  mail:
    from: noreply@chefmgmt.com
chef-mgmt:
  messaging:
    order-mail:
      queue: test-order-queue

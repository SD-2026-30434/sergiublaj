spring:
  application:
    name: chef-mgmt-mail
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/chef_mgmt_db
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  rabbitmq:
    host: localhost
    port: 5672
server:
  port: 8888
  servlet:
    context-path: '/api'
app:
  mail:
    from: noreply@chefmgmt.com
chef-mgmt:
  messaging:
    order-mail:
      queue: chef-mgmt.order-mail.queue
